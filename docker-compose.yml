services:
  postgres:
    image: postgres:16-alpine
    container_name: webflowai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webflowai
      POSTGRES_PASSWORD: webflowai
      POSTGRES_DB: webflowai
    ports:
      - "5432:5432"
    volumes:
      - webflowai-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webflowai -d webflowai"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: webflowai-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://webflowai:webflowai@postgres:5432/webflowai?schema=public
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  webflowai-pgdata:
